<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#1e0f17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="The Game" />
<title>The Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1e0f17;
    --bg-edge:#140910;
    --ink:#f2e5ec;
    --muted:#a78a95;
    --rose:#e7a3c0;
    --wine:#c96e91;
    --line:rgba(231,163,192,0.24);
    --line-lit:rgba(231,163,192,0.55);
    --fade:.55s;
  }

  *{box-sizing:border-box;}

  html{
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }

  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(120% 120% at 50% 40%, var(--bg) 0%, var(--bg-edge) 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Jost", system-ui, sans-serif;
    font-weight:300;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }

  /* the "path" — a soft light that breathes behind everything */
  .path{
    position:fixed;
    top:38%;
    left:50%;
    width:min(78vw,540px);
    height:min(78vw,540px);
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,
      rgba(231,163,192,0.20) 0%,
      rgba(201,110,145,0.10) 35%,
      rgba(30,15,23,0) 70%);
    filter:blur(6px);
    pointer-events:none;
    animation:breathe 7s ease-in-out infinite;
    z-index:0;
  }
  @keyframes breathe{
    0%,100%{opacity:.65; transform:translate(-50%,-50%) scale(1);}
    50%{opacity:1; transform:translate(-50%,-50%) scale(1.08);}
  }
  body.quiet .path{
    animation:none;
    opacity:.4;
    transition:opacity 2.5s ease;
  }

  .screen{
    display:none;
    min-height:100vh;
    min-height:100dvh;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:
      calc(7vh + env(safe-area-inset-top))
      calc(7vw + env(safe-area-inset-right))
      calc(6vh + env(safe-area-inset-bottom))
      calc(7vw + env(safe-area-inset-left));
    opacity:0;
    transition:opacity var(--fade) ease;
    position:relative;
    z-index:1;
  }
  .screen.active{display:flex;}
  .screen.shown{opacity:1;}

  .signet{
    color:var(--rose);
    font-size:1rem;
    line-height:1;
    margin-bottom:2.4rem;
    opacity:.7;
    text-shadow:0 0 14px rgba(231,163,192,.6);
  }

  .question{
    font-family:"Cormorant Garamond", Georgia, serif;
    font-weight:300;
    font-size:clamp(1.95rem,7vw,3.4rem);
    line-height:1.2;
    letter-spacing:.3px;
    max-width:18ch;
    margin:0 0 2.6rem;
  }

  .field{
    width:min(88vw,420px);
    position:relative;
  }
  .field input{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    border-radius:0;
    color:var(--ink);
    font-family:"Jost", system-ui, sans-serif;
    font-weight:300;
    font-size:1.35rem; /* >=16px: stops iOS auto-zoom on focus */
    text-align:center;
    letter-spacing:.5px;
    padding:.55rem .25rem .75rem;
    caret-color:var(--rose);
    outline:none;
    transition:border-color .4s ease;
  }
  .field input::placeholder{color:var(--muted); opacity:.6;}
  .field input:focus{border-bottom-color:var(--line-lit);}
  .field.refused input{border-bottom-color:var(--wine);}

  /* one shared button — used for both "Enter" and "Continue" */
  .btn{
    -webkit-appearance:none;
    appearance:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:54px;
    padding:1rem 2.8rem;
    background:transparent;
    border:1px solid var(--line-lit);
    border-radius:999px;
    color:var(--ink);
    font-family:"Jost", system-ui, sans-serif;
    font-weight:300;
    font-size:1rem;
    letter-spacing:.28em;
    text-transform:uppercase;
    cursor:pointer;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    transition:border-color .3s ease, background .3s ease, color .3s ease, transform .15s ease;
  }
  .btn:active{
    transform:scale(.97);
    border-color:var(--rose);
    color:var(--rose);
    background:rgba(231,163,192,.10);
  }
  @media (hover:hover){
    .btn:hover{
      border-color:var(--rose);
      color:var(--rose);
      background:rgba(231,163,192,.06);
    }
  }
  .btn.enter{margin-top:2.2rem;}
  .btn.continue{margin-top:2.8rem;}

  .refusal{
    margin-top:1.6rem;
    min-height:1.2em;
    font-size:.8rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--wine);
    opacity:0;
    transition:opacity .4s ease;
  }
  .refusal.show{opacity:1;}

  .line{
    font-family:"Cormorant Garamond", Georgia, serif;
    font-weight:300;
    font-size:clamp(1.85rem,6.5vw,3rem);
    line-height:1.3;
    max-width:22ch;
    margin:0;
  }
  .line em{font-style:italic; color:var(--rose);}
  .final .line{max-width:24ch;}

  a:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--rose);
    outline-offset:4px;
  }

  @keyframes shudder{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-5px);}
    60%{transform:translateX(5px);}
    80%{transform:translateX(-3px);}
  }
  .field.refused{animation:shudder .35s ease;}

  @media (prefers-reduced-motion: reduce){
    .path{animation:none;}
    .screen{transition:none;}
    .field.refused{animation:none;}
    .btn{transition:none;}
  }
</style>
</head>
<body>
  <div class="path" aria-hidden="true"></div>

  <!-- Screen 1: first question -->
  <section class="screen active shown" id="q1" aria-label="Question one">
    <div class="signet" aria-hidden="true">&#9670;</div>
    <h1 class="question">What nickname did you want me to reserve only for you?</h1>
    <div class="field" id="field1">
      <input id="answer1" type="text" inputmode="text" enterkeyhint="go"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" placeholder="…" aria-label="Your answer" />
    </div>
    <button class="btn enter" id="submit1">Enter</button>
    <p class="refusal" id="refusal1" role="status" aria-live="polite">That isn't the name. Try again.</p>
  </section>

  <!-- Screen 2: interstitial -->
  <section class="screen" id="pass1" aria-label="You may continue">
    <div class="signet" aria-hidden="true">&#9670;</div>
    <p class="line">Very good, princess.<br>You understand the game.</p>
    <button class="btn continue" id="continue1">Continue</button>
  </section>

  <!-- Screen 3: second question -->
  <section class="screen" id="q2" aria-label="Question two">
    <div class="signet" aria-hidden="true">&#9670;</div>
    <h1 class="question">What did the world hear the first time we kissed?</h1>
    <div class="field" id="field2">
      <input id="answer2" type="text" inputmode="text" enterkeyhint="go"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" placeholder="…" aria-label="Your answer" />
    </div>
    <button class="btn enter" id="submit2">Enter</button>
    <p class="refusal" id="refusal2" role="status" aria-live="polite">No. Listen again.</p>
  </section>

  <!-- Screen 4: final -->
  <section class="screen final" id="end" aria-label="The end, for now">
    <div class="signet" aria-hidden="true">&#9670;</div>
    <p class="line">The path is quiet for now.<br>When it speaks again, <em>you'll know.</em></p>
  </section>

<script>
  // Lenient answer check: lowercase, trim, strip wrapping quotes and trailing . ! ?
  function normalize(v){
    return v
      .toLowerCase()
      .trim()
      .replace(/^["'\u201c\u2018]+|["'\u201d\u2019]+$/g, '')
      .replace(/[.!?]+$/g, '')
      .trim();
  }

  // Self-contained SHA-256 (no library, works over http or https, offline).
  // The plaintext answers never appear in this file — only their fingerprints.
  function sha256(ascii){
    function rightRotate(v,n){ return (v>>>n)|(v<<(32-n)); }
    var mathPow=Math.pow, maxWord=mathPow(2,32), result='';
    var words=[], asciiBitLength=ascii.length*8;
    var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[], primeCounter=k.length;
    var isComposite={};
    for(var candidate=2; primeCounter<64; candidate++){
      if(!isComposite[candidate]){
        for(var i=0;i<313;i+=candidate){ isComposite[i]=candidate; }
        hash[primeCounter]=(mathPow(candidate,0.5)*maxWord)|0;
        k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
      }
    }
    ascii+='\x80';
    while(ascii.length%64-56) ascii+='\x00';
    for(var i=0;i<ascii.length;i++){
      var j=ascii.charCodeAt(i);
      if(j>>8) return '';
      words[i>>2]|=j<<((3-i)%4)*8;
    }
    words[words.length]=(asciiBitLength/maxWord)|0;
    words[words.length]=asciiBitLength;
    for(var j=0;j<words.length;){
      var w=words.slice(j,j+=16), oldHash=hash;
      hash=hash.slice(0,8);
      for(var i=0;i<64;i++){
        var w15=w[i-15], w2=w[i-2], a=hash[0], e=hash[4];
        var temp1=hash[7]
          +(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))
          +((e&hash[5])^(~e&hash[6]))+k[i]
          +(w[i]=(i<16)?w[i]:(
              w[i-16]
              +(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))
              +w[i-7]
              +(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10))
            )|0);
        var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))
          +((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
        hash=[(temp1+temp2)|0].concat(hash);
        hash[4]=(hash[4]+temp1)|0;
      }
      for(var i=0;i<8;i++){ hash[i]=(hash[i]+oldHash[i])|0; }
    }
    for(var i=0;i<8;i++){
      for(var j=3;j+1;j--){
        var b=(hash[i]>>(j*8))&255;
        result+=((b<16)?0:'')+b.toString(16);
      }
    }
    return result;
  }

  var REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var FADE = REDUCED ? 0 : 550;

  var screens = {
    q1: document.getElementById('q1'),
    pass1: document.getElementById('pass1'),
    q2: document.getElementById('q2'),
    end: document.getElementById('end'),
  };

  function show(id){
    var next = screens[id];
    var current = document.querySelector('.screen.active');
    if(current === next) return;
    if(id === 'end'){ document.body.classList.add('quiet'); }

    function reveal(){
      next.classList.add('active');   // display:flex, opacity 0
      void next.offsetWidth;          // reflow so the fade can run
      next.classList.add('shown');    // fade in
      window.scrollTo(0, 0);
    }

    if(current){
      current.classList.remove('shown');           // fade out
      setTimeout(function(){
        current.classList.remove('active', 'shown');
        reveal();
      }, FADE);
    } else {
      reveal();
    }
  }

  function wireQuestion(inputId, submitId, fieldId, refusalId, answerHash, onPass){
    var input = document.getElementById(inputId);
    var submit = document.getElementById(submitId);
    var field = document.getElementById(fieldId);
    var refusal = document.getElementById(refusalId);

    function attempt(){
      if(sha256(normalize(input.value)) === answerHash){
        refusal.classList.remove('show');
        field.classList.remove('refused');
        input.blur(); // dismiss the iOS keyboard on success
        onPass();
      } else {
        refusal.classList.add('show');
        field.classList.remove('refused');
        void field.offsetWidth; // replay the shudder
        field.classList.add('refused');
        input.select();
      }
    }

    submit.addEventListener('click', attempt);
    input.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ e.preventDefault(); attempt(); }
    });
    input.addEventListener('input', function(){ refusal.classList.remove('show'); });
  }

  // fingerprints, not answers — you cannot read the words out of these
  wireQuestion('answer1','submit1','field1','refusal1',
    '04e77bf8f95cb3e1a36a59d1e93857c411930db646b46c218a0352e432023cf2', function(){ show('pass1'); });
  wireQuestion('answer2','submit2','field2','refusal2',
    'e6c18fdbe59783dfefef3595cd288bcb7ce912d36854b5e8faaef31235d9031b', function(){ show('end'); });

  document.getElementById('continue1').addEventListener('click', function(){ show('q2'); });
</script>
</body>
</html>
